name: SoroSwap CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'

jobs:
  # ── Contract Build & Test ─────────────────────────────────
  contracts:
    name: 🦀 Contracts (Build + Test)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=-reference-types"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.81.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.81.0
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v26.0.0

      - name: Clean any stale cache
        run: cargo clean

      - name: Check contract formatting
        run: cargo fmt --all -- --check

      - name: Lint contracts
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run contract tests
        run: cargo test --all

      - name: Build release WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Optimize WASMs for Soroban
        run: |
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/soroswap_token.wasm
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/soroswap_pool.wasm
          echo "--- Optimized files ---"
          ls -la target/wasm32-unknown-unknown/release/*.optimized.wasm

      - name: Upload Optimized WASMs
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasms
          path: target/wasm32-unknown-unknown/release/*.optimized.wasm
          if-no-files-found: error

  # ── Frontend Lint & Build ─────────────────────────────────
  frontend:
    name: ⚡ Frontend (Lint + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: TESTNET
          NEXT_PUBLIC_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          NEXT_PUBLIC_TOKEN_A_CONTRACT: ${{ secrets.TOKEN_A_CONTRACT }}
          NEXT_PUBLIC_TOKEN_B_CONTRACT: ${{ secrets.TOKEN_B_CONTRACT }}
          NEXT_PUBLIC_POOL_CONTRACT: ${{ secrets.POOL_CONTRACT }}

      - name: Run frontend tests
        run: npm run test -- --passWithNoTests
        env:
          CI: true

  # ── Deploy Contracts to Testnet ───────────────────────────
  deploy-contracts:
    name: 📦 Deploy Contracts (Testnet)
    needs: [contracts, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v26.0.0

      - name: Download Optimized WASMs
        uses: actions/download-artifact@v4
        with:
          name: contract-wasms
          path: target/wasm32-unknown-unknown/release/

      - name: Verify downloaded WASMs
        run: |
          echo "--- Downloaded WASM files ---"
          ls -la target/wasm32-unknown-unknown/release/
          echo "--- Checking file sizes ---"
          wc -c target/wasm32-unknown-unknown/release/*.optimized.wasm

      - name: Configure Identity
        run: |
          if [ -n "$DEPLOYER_KEY" ]; then
            echo "$DEPLOYER_KEY" | stellar keys add deployer --secret-key --stdin
            echo "✅ Using pre-configured deployer identity"
          else
            echo "ℹ️  No DEPLOYER_SECRET_KEY — generating ephemeral keypair"
            stellar keys generate deployer --network testnet
          fi
        env:
          DEPLOYER_KEY: ${{ secrets.DEPLOYER_SECRET_KEY }}

      - name: Deploy contracts to Testnet
        run: bash scripts/deploy.sh
        env:
          SOROBAN_NETWORK: testnet
          SOROBAN_IDENTITY: deployer
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org

  # ── NOTE: Frontend deploys automatically via Vercel GitHub integration ──
  # No CLI-based Vercel deployment needed. Vercel watches the main branch
  # and deploys on every push automatically.
